openapi: 3.0.3
info:
  title: Ticketing API
  description: 티켓팅/예약 시스템 API 명세
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: 로컬 개발 환경

tags:
  - name: concert
    description: 공연 조회
  - name: show
    description: 회차 조회
  - name: seat
    description: 좌석 조회
  - name: hold
    description: 좌석 홀드
  - name: reservation
    description: 예약

paths:
  /api/concerts:
    get:
      tags: [concert]
      summary: 공연 목록 조회
      description: 공연 목록을 조회한다.
      operationId: getConcerts
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          description: 페이지 크기
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConcertResponse'
        '400':
          description: 페이지 번호 또는 페이지 크기가 유효하지 않음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/concerts/{id}:
    get:
      tags: [concert]
      summary: 공연 상세 조회
      description: 공연 ID로 단일 공연 정보를 조회한다.
      operationId: getConcert
      parameters:
        - name: id
          in: path
          required: true
          description: 공연 ID
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcertResponse'
        '404':
          description: 공연을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/concerts/{id}/shows:
    get:
      tags: [show]
      summary: 회차 목록 조회
      description: 특정 공연의 회차(공연 일정) 목록을 조회한다.
      operationId: getShowsByConcert
      parameters:
        - name: id
          in: path
          required: true
          description: 공연 ID
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShowResponse'
        '404':
          description: 공연을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shows/{id}/seats:
    get:
      tags: [seat]
      summary: 좌석 목록 조회
      description: 특정 회차의 좌석 목록을 조회한다.
      operationId: getSeatsByShow
      parameters:
        - name: id
          in: path
          required: true
          description: 회차 ID
          schema:
            type: integer
            format: int64
            example: 10
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeatResponse'
        '404':
          description: 회차를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shows/{showId}/seats/{seatId}/hold:
    post:
      tags: [hold]
      summary: 좌석 홀드 (3분 TTL)
      description: |
        좌석을 임시 점유한다. 같은 Idempotency-Key 로 재요청하면 동일한 응답을 반환한다.
      operationId: holdSeat
      parameters:
        - name: showId
          in: path
          required: true
          description: 회차 ID
          schema:
            type: integer
            format: int64
            example: 10
        - name: seatId
          in: path
          required: true
          description: 좌석 ID
          schema:
            type: integer
            format: int64
            example: 100
        - name: Idempotency-Key
          in: header
          required: true
          description: 재시도 안전성을 위한 멱등성 키 (UUID 권장)
          schema:
            type: string
            example: "8f3c1b9a-4d2e-4f1a-9c5b-2e1d3a4b5c6d"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatHoldRequest'
      responses:
        '201':
          description: 홀드 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatHoldResponse'
        '404':
          description: 회차 또는 좌석을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 이미 점유되었거나 예매 완료된 좌석
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/reservations:
    post:
      tags: [reservation]
      summary: 예약 확정
      description: 활성 상태의 좌석 홀드를 예약으로 확정한다.
      operationId: confirmReservation
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: 재시도 안전성을 위한 멱등성 키
          schema:
            type: string
            example: "1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationRequest'
      responses:
        '201':
          description: 예약 확정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          description: 홀드를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 만료/취소된 홀드이거나 이미 예약된 좌석
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/holds/{id}:
    delete:
      tags: [hold]
      summary: 홀드 취소
      description: 활성 상태의 좌석 홀드를 취소한다.
      operationId: cancelHold
      parameters:
        - name: id
          in: path
          required: true
          description: 좌석 홀드 ID
          schema:
            type: integer
            format: int64
            example: 5001
      responses:
        '204':
          description: 취소 성공 (응답 본문 없음)
        '404':
          description: 홀드를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 이미 만료/확정된 홀드라 취소 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # ──────────────────────────────────────────
    # 공통
    # ──────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 도메인 에러 코드
          example: CONCERT_NOT_FOUND
        message:
          type: string
          description: 사람이 읽을 에러 메시지
          example: "공연을 찾을 수 없습니다."

    # ──────────────────────────────────────────
    # 공연
    # ──────────────────────────────────────────
    ConcertResponse:
      type: object
      required: [id, title]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "2026 콘서트"
        createdAt:
          type: string
          format: date-time
          example: "2026-05-01T10:00:00Z"

    # ──────────────────────────────────────────
    # 회차
    # ──────────────────────────────────────────
    ShowResponse:
      type: object
      required: [id, concertId, showAt]
      properties:
        id:
          type: integer
          format: int64
          example: 10
        concertId:
          type: integer
          format: int64
          example: 1
        showAt:
          type: string
          format: date-time
          description: 공연 시작 일시
          example: "2026-06-15T19:00:00Z"

    # ──────────────────────────────────────────
    # 좌석
    # ──────────────────────────────────────────
    SeatStatus:
      type: string
      enum: [AVAILABLE, HELD, RESERVED]
      description: |
        - AVAILABLE: 예매 가능
        - HELD: 임시 점유 (홀드 중)
        - RESERVED: 예매 완료

    SeatResponse:
      type: object
      required: [id, showId, seatNo, grade, price, status]
      properties:
        id:
          type: integer
          format: int64
          example: 100
        showId:
          type: integer
          format: int64
          example: 10
        seatNo:
          type: string
          description: 좌석 번호 (예 A-12)
          example: "A-12"
        grade:
          type: string
          description: 좌석 등급
          example: "VIP"
        price:
          type: integer
          description: 가격 (원)
          example: 150000
        status:
          $ref: '#/components/schemas/SeatStatus'

    # ──────────────────────────────────────────
    # 좌석 홀드
    # ──────────────────────────────────────────
    SeatHoldStatus:
      type: string
      enum: [HELD, EXPIRED, CANCELLED, CONFIRMED]
      description: |
        - HELD: 점유 중 (TTL 유효)
        - EXPIRED: 만료
        - CANCELLED: 사용자 취소
        - CONFIRMED: 예약 확정으로 전환됨

    SeatHoldRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          format: int64
          description: 홀드를 요청한 사용자 ID
          example: 42

    SeatHoldResponse:
      type: object
      required: [id, showId, seatId, userId, status, expiresAt]
      properties:
        id:
          type: integer
          format: int64
          example: 5001
        showId:
          type: integer
          format: int64
          example: 10
        seatId:
          type: integer
          format: int64
          example: 100
        userId:
          type: integer
          format: int64
          example: 42
        status:
          $ref: '#/components/schemas/SeatHoldStatus'
        expiresAt:
          type: string
          format: date-time
          description: 홀드 만료 시각 (3분 TTL)
          example: "2026-05-08T12:03:00Z"

    # ──────────────────────────────────────────
    # 예약
    # ──────────────────────────────────────────
    ReservationStatus:
      type: string
      enum: [CONFIRMED, CANCELLED]
      description: |
        - CONFIRMED: 예약 확정
        - CANCELLED: 취소됨

    ReservationRequest:
      type: object
      required: [holdId, userId]
      properties:
        holdId:
          type: integer
          format: int64
          description: 확정할 좌석 홀드 ID
          example: 5001
        userId:
          type: integer
          format: int64
          example: 42

    ReservationResponse:
      type: object
      required: [id, reservationNo, showId, seatId, userId, holdId, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
          example: 9001
        reservationNo:
          type: string
          description: 사용자에게 노출되는 예약 번호
          example: "R-20260508-0001"
        showId:
          type: integer
          format: int64
          example: 10
        seatId:
          type: integer
          format: int64
          example: 100
        userId:
          type: integer
          format: int64
          example: 42
        holdId:
          type: integer
          format: int64
          example: 5001
        status:
          $ref: '#/components/schemas/ReservationStatus'
        createdAt:
          type: string
          format: date-time
          example: "2026-05-08T12:01:30Z"
