services:
  mysql:
    image: mysql:8.4
    container_name: ticketing-mysql
    # 호스트 3306에 로컬 mysqld가 있으면 연결이 Docker가 아니라 로컬로 갈 수 있어 3307로 노출
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD (see .env.example)}
      MYSQL_DATABASE: ticketing
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ticketing-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  ticketing-mysql-data:
